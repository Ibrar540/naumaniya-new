name: naumaniya
description: A new Flutter project for Darul Uloom Naumaniya.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  sqflite: ^2.4.2
  path: ^1.9.1
  intl: ^0.20.2
  speech_to_text: ^7.1.0
  # flutter_tts: ^4.2.3  # Temporarily disabled due to CMake compatibility issue
  image_picker: ^1.0.7
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  pdf: ^3.10.4
  printing: ^5.12.0
  excel: ^4.0.6
  path_provider: ^2.1.1
  open_file: ^3.3.2
  postgres: ^3.0.0
  device_info_plus: ^11.5.0
  # google_fonts: ^6.1.0  # Temporarily disabled due to compilation error
  http: ^1.2.1
  image: ^4.3.0
  crypto: ^3.0.3
  cached_network_image: ^3.3.1
  connectivity_plus: ^6.1.4
  flutter_secure_storage: ^9.0.0
  workmanager: ^0.8.0
  string_similarity: ^2.0.0
  cloudinary_public: ^0.23.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/creater_photo.jpg.jpg 
    - assets/preparedapp.png

flutter_icons:
  android: true
  ios: false
  image_path: "assets/preparedapp.png"
  remove_alpha_ios: true
  android_adaptive_icon:
    background: "#FFFFFF"
    foreground_image: "assets/preparedapp.png"
